version: 2
updates:
  # Keep NuGet dependencies current (security patches and minor updates).
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      entity-framework:
        patterns:
          - "Microsoft.EntityFrameworkCore*"

  # Keep GitHub Actions pinned and patched.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
